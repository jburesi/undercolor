services:
  undercolor:
    image: ghcr.io/jburesi/undercolor:latest
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_UNDERCOLOR_3000
      # Supabase configuration (used by @nuxtjs/supabase)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    healthcheck:
      test:
        - CMD
        - /beszel
        - health
        - "--url"
        - "http://localhost:3000"
      start_period: 10s
      interval: 30s
