services:
  undercolor:
    image: ghcr.io/jburesi/undercolor:latest
    container_name: undercolor
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Supabase configuration (used by @nuxtjs/supabase)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
